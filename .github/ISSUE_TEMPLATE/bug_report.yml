name: Bug report
description: Report a reproducible defect in ovpn.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Use this form for confirmed defects. For setup help or open-ended questions, use Discussions.
  - type: input
    id: version
    attributes:
      label: ovpn version
      description: Output of `./ovpn version` or the release version.
      placeholder: 1.1.0
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - CLI
        - Agent
        - Telegram bot
        - Monitoring / Grafana / Prometheus
        - Ansible
        - CI / Release workflow
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken, and what did you expect instead?
      placeholder: A short, operator-focused problem statement.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact commands, inputs, and sequence.
      render: bash
      placeholder: |
        1. Run ...
        2. Execute ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Redact tokens, private keys, IPs, domains, and user data before posting.
      render: text
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, Go version, Docker/Compose version, and anything else relevant.
      placeholder: Debian 12, amd64, Go 1.26.x, Docker 28.x
    validations:
      required: true
  - type: checkboxes
    id: confirmations
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions.
          required: true
        - label: I removed secrets, private infrastructure details, and personal data from this report.
          required: true
