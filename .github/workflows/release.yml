name: Release

on:
  push:
    branches:
      - main
    paths:
      - VERSION
      - CHANGELOG.md
  workflow_dispatch:
    inputs:
      version:
        description: "Existing release version to rebuild (defaults to VERSION)"
        required: false
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  resolve:
    name: Resolve Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      mode: ${{ steps.resolve.outputs.mode }}

    steps:
      - name: Checkout
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve release state
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          version="$(tr -d '[:space:]' < VERSION)"
          if ! [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must be plain semver, got: ${version}" >&2
            exit 1
          fi

          changelog_version="$(grep -E '^## [0-9]+\.[0-9]+\.[0-9]+$' CHANGELOG.md | head -n1 | awk '{print $2}')"
          if [ -z "${changelog_version}" ]; then
            echo "CHANGELOG.md top version heading not found" >&2
            exit 1
          fi
          if [ "${changelog_version}" != "${version}" ]; then
            echo "CHANGELOG.md top version ${changelog_version} does not match VERSION ${version}" >&2
            exit 1
          fi

          mode="skip"
          target_version="${version}"

          case "${EVENT_NAME}" in
            push)
              base_sha="${BEFORE_SHA}"
              if [ -z "${base_sha}" ] || [ "${base_sha}" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "${base_sha}^{commit}" 2>/dev/null; then
                base_sha="$(git rev-list --max-parents=0 HEAD)"
              fi
              changed_files="$(git diff --name-only "${base_sha}" "${GITHUB_SHA}")"
              version_changed=false
              changelog_changed=false
              if printf '%s\n' "${changed_files}" | grep -qx 'VERSION'; then
                version_changed=true
              fi
              if printf '%s\n' "${changed_files}" | grep -qx 'CHANGELOG.md'; then
                changelog_changed=true
              fi
              if [ "${version_changed}" = "true" ] && [ "${changelog_changed}" = "true" ]; then
                if git rev-parse -q --verify "refs/tags/${version}" >/dev/null; then
                  echo "release tag ${version} already exists; skipping automatic release"
                  mode="skip"
                  echo "version=${target_version}" >> "$GITHUB_OUTPUT"
                  echo "mode=${mode}" >> "$GITHUB_OUTPUT"
                  exit 0
                fi
                if gh release view "${version}" >/dev/null 2>&1; then
                  echo "GitHub release ${version} already exists; skipping automatic release"
                  mode="skip"
                  echo "version=${target_version}" >> "$GITHUB_OUTPUT"
                  echo "mode=${mode}" >> "$GITHUB_OUTPUT"
                  exit 0
                fi
                mode="create"
              fi
              ;;
            workflow_dispatch)
              if [ -n "${INPUT_VERSION}" ]; then
                target_version="$(printf '%s' "${INPUT_VERSION}" | tr -d '[:space:]')"
              fi
              if [ "${target_version}" != "${version}" ]; then
                echo "workflow_dispatch version ${target_version} must match VERSION ${version}" >&2
                exit 1
              fi
              if ! gh release view "${target_version}" >/dev/null 2>&1; then
                echo "GitHub release ${target_version} does not exist; workflow_dispatch supports rebuild of an existing release only" >&2
                exit 1
              fi
              mode="rebuild"
              ;;
          esac

          echo "version=${target_version}" >> "$GITHUB_OUTPUT"
          echo "mode=${mode}" >> "$GITHUB_OUTPUT"

  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: resolve
    if: ${{ needs.resolve.outputs.mode != 'skip' }}
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: Checkout
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Go
        # actions/setup-go v6.4.0
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
          cache: true

      - name: Build ovpn and ovpn-agent
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          target="${{ matrix.goos }}_${{ matrix.goarch }}"
          outdir="dist/${target}"
          mkdir -p "$outdir"
          ldflags="-s -w -X ovpn/internal/version.pinnedVersion=${VERSION}"

          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -trimpath -ldflags="${ldflags}" -o "$outdir/ovpn" ./cmd/ovpn
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -trimpath -ldflags="${ldflags}" -o "$outdir/ovpn-agent" ./cmd/ovpn-agent

          archive="ovpn_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          tar -C "$outdir" -czf "dist/$archive" ovpn ovpn-agent

      - name: Upload build artifact
        # actions/upload-artifact v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - resolve
      - build
    if: ${{ needs.resolve.outputs.mode != 'skip' }}
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        # actions/download-artifact v8.0.1
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt

      - name: Upload checksums artifact
        # actions/upload-artifact v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-checksums
          path: dist/checksums.txt

      - name: Create or refresh GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.resolve.outputs.version }}
          MODE: ${{ needs.resolve.outputs.mode }}
        run: |
          set -euo pipefail
          if [ "$MODE" = "create" ]; then
            gh release create "$VERSION" dist/*.tar.gz dist/checksums.txt \
              --target "$GITHUB_SHA" \
              --generate-notes \
              --title "$VERSION"
          elif [ "$MODE" = "rebuild" ]; then
            gh release upload "$VERSION" dist/*.tar.gz dist/checksums.txt --clobber
          else
            echo "unexpected release mode: $MODE" >&2
            exit 1
          fi

      - name: Release job summary
        if: always()
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
          MODE: ${{ needs.resolve.outputs.mode }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          archives="$(find dist -maxdepth 1 -type f -name '*.tar.gz' 2>/dev/null || true)"
          archives_count="$(printf '%s\n' "${archives}" | sed '/^$/d' | wc -l | tr -d ' ')"
          targets="$(printf '%s\n' "${archives}" | sed '/^$/d' | sed -E 's#.*/ovpn_[^_]+_(.*)\.tar\.gz#\1#' | tr '\n' ', ' | sed 's/, $//')"
          if [ -z "${targets}" ]; then
            targets="n/a"
          fi
          {
            echo "## Release Summary"
            echo
            printf -- "- Version: \`%s\`\n" "${VERSION:-n/a}"
            printf -- "- Mode: \`%s\`\n" "${MODE:-n/a}"
            printf -- "- Targets built: \`%s\`\n" "${targets}"
            printf -- "- Archives: \`%s\`\n" "${archives_count}"
            echo "- Checksums: \`dist/checksums.txt\`"
            printf -- "- Run artifacts: [actions run](%s)\n" "${RUN_URL}"
          } >> "$GITHUB_STEP_SUMMARY"
