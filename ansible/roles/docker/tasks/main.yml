---
- name: Ensure Docker apt dependencies are installed
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Create Docker keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Set Docker repo distro id
  ansible.builtin.set_fact:
    docker_repo_distro: "{{ {'Debian': 'debian', 'Ubuntu': 'ubuntu'}.get(ansible_distribution, '') }}"

- name: Assert Docker repo distro is supported
  ansible.builtin.assert:
    that:
      - docker_repo_distro | length > 0
    fail_msg: "Docker role supports Debian and Ubuntu only (got {{ ansible_distribution }})"

- name: Install Docker APT GPG key
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ docker_repo_distro }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Map architecture for Docker repo
  ansible.builtin.set_fact:
    docker_arch: "{{ {'x86_64': 'amd64', 'aarch64': 'arm64', 'armv7l': 'armhf'}[ansible_architecture] | default(ansible_architecture) }}"

- name: Configure Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ docker_arch }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/{{ docker_repo_distro }} {{ ansible_distribution_release }} stable"
    filename: docker
    state: present

- name: Install Docker engine and compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Enable and start Docker
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Add ansible user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true
