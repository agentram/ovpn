global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093

  - job_name: node_exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: ovpn_agent
    metrics_path: /metrics
    static_configs:
      - targets:
          - ovpn-agent:9090

  - job_name: ovpn_telegram_bot
    metrics_path: /metrics
    static_configs:
      - targets:
          - ovpn-telegram-bot:8080
